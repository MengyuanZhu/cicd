apiVersion: tekton.dev/v1beta1
kind: StepAction
metadata:
  name: vault-broker-read-secret
  labels:
    app.kubernetes.io/part-of: tekton-ui-vault-demo
  annotations:
    tekton.dev/displayName: Read Vault secret through Tekton UI broker
spec:
  description: >-
    Exchanges a short-lived Tekton UI runtime grant for a Vault token, then
    verifies that a KV v2 secret can be read without exposing AppRole values to
    the PipelineRun.
  image: node:24-alpine
  params:
    - name: secret-path
      type: string
      description: Vault KV path to read, using Vault CLI syntax.
      default: secret/test
    - name: result-path
      type: string
      description: File path where the action writes a small success marker.
      default: /tekton/results/vault-read-status
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  env:
    - name: SECRET_PATH
      value: "$(params.secret-path)"
    - name: RESULT_PATH
      value: "$(params.result-path)"
  script: |
    #!/usr/local/bin/node
    const fs = require("node:fs");

    const brokerUrl = process.env.TEKTON_UI_BROKER_URL;
    const runToken = process.env.TEKTON_UI_RUN_TOKEN;
    const secretPath = process.env.SECRET_PATH;
    const resultPath = process.env.RESULT_PATH;

    if (!brokerUrl || !runToken || !secretPath || !resultPath) {
      throw new Error("Broker URL, run token, secret path, and result path must be available in the step environment.");
    }

    function kvV2ApiPath(cliPath) {
      const parts = cliPath.replace(/^\/+|\/+$/g, "").split("/");
      if (parts.length < 2) {
        throw new Error(`KV v2 path must include mount and name, got "${cliPath}".`);
      }
      const mount = encodeURIComponent(parts.shift());
      const name = parts.map(encodeURIComponent).join("/");
      return `/v1/${mount}/data/${name}`;
    }

    const brokerResponse = await fetch(brokerUrl, {
      method: "POST",
      headers: {
        authorization: `Bearer ${runToken}`,
        "content-type": "application/json"
      },
      body: JSON.stringify({ secretPath })
    });
    if (!brokerResponse.ok) {
      throw new Error(`Broker token exchange failed: ${brokerResponse.status} ${await brokerResponse.text()}`);
    }
    const brokerPayload = await brokerResponse.json();
    if (!brokerPayload.token) {
      throw new Error("Broker response did not include a Vault token.");
    }
    if (!brokerPayload.vaultAddress) {
      throw new Error("Broker response did not include a Vault address.");
    }

    const vaultUrl = new URL(kvV2ApiPath(secretPath), brokerPayload.vaultAddress);
    const headers = { "X-Vault-Token": brokerPayload.token };
    if (brokerPayload.vaultNamespace) {
      headers["X-Vault-Namespace"] = brokerPayload.vaultNamespace;
    }
    const vaultResponse = await fetch(vaultUrl, { headers });
    if (!vaultResponse.ok) {
      throw new Error(`Vault secret read failed: ${vaultResponse.status} ${await vaultResponse.text()}`);
    }
    await vaultResponse.json();
    fs.writeFileSync(resultPath, "ok");
    console.log(`Vault secret read succeeded for path ${secretPath}`);
