apiVersion: tekton.dev/v1beta1
kind: StepAction
metadata:
  name: vault-broker-read-secret
  labels:
    app.kubernetes.io/part-of: maestro-vault-demo
  annotations:
    tekton.dev/displayName: Read Vault secret through Maestro broker
spec:
  description: >-
    Exchanges a short-lived Maestro runtime grant for a Vault token, then
    verifies that a KV secret can be read without exposing AppRole values to
    the PipelineRun.
  image: node:24-alpine
  params:
    - name: broker-url
      type: string
      description: Maestro runtime broker endpoint. Injected by the app at PipelineRun creation.
      default: ""
    - name: run-token
      type: string
      description: Short-lived runtime grant token. Injected by the app at PipelineRun creation.
      default: ""
    - name: allowed-secret-paths
      type: string
      description: Comma-separated Vault paths allowed by the runtime grant.
      default: ""
    - name: secret-path
      type: string
      description: Vault KV path to read, using Vault CLI syntax.
      default: kv/test
    - name: kv-engine-version
      type: string
      description: "Vault KV engine version: auto, 1, or 2."
      default: auto
    - name: secret-key
      type: string
      description: Key inside the Vault secret data to verify.
      default: value
    - name: reveal-secret-value
      type: string
      description: Print the selected secret value to logs. Use only for local testing.
      default: "false"
    - name: result-path
      type: string
      description: File path where the action writes a small success marker.
      default: /tekton/results/vault-read-status
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  env:
    - name: TEKTON_UI_BROKER_URL
      value: "$(params.broker-url)"
    - name: TEKTON_UI_RUN_TOKEN
      value: "$(params.run-token)"
    - name: TEKTON_UI_VAULT_ALLOWED_SECRET_PATHS
      value: "$(params.allowed-secret-paths)"
    - name: SECRET_PATH
      value: "$(params.secret-path)"
    - name: KV_ENGINE_VERSION
      value: "$(params.kv-engine-version)"
    - name: SECRET_KEY
      value: "$(params.secret-key)"
    - name: REVEAL_SECRET_VALUE
      value: "$(params.reveal-secret-value)"
    - name: RESULT_PATH
      value: "$(params.result-path)"
  script: |
    #!/usr/local/bin/node
    import { writeFileSync } from "node:fs";

    const brokerUrl = process.env.TEKTON_UI_BROKER_URL;
    const runToken = process.env.TEKTON_UI_RUN_TOKEN;
    const secretPath = process.env.SECRET_PATH;
    const kvEngineVersion = process.env.KV_ENGINE_VERSION || "auto";
    const secretKey = process.env.SECRET_KEY || "value";
    const revealSecretValue = (process.env.REVEAL_SECRET_VALUE || "false").toLowerCase() === "true";
    const resultPath = process.env.RESULT_PATH;

    const missing = [
      ["TEKTON_UI_BROKER_URL", brokerUrl],
      ["TEKTON_UI_RUN_TOKEN", runToken],
      ["SECRET_PATH", secretPath],
      ["RESULT_PATH", resultPath]
    ].filter(([, value]) => !value).map(([name]) => name);

    if (missing.length > 0) {
      throw new Error(`Missing required step environment variables: ${missing.join(", ")}`);
    }

    function kvApiPath(cliPath, version) {
      const parts = cliPath.replace(/^\/+|\/+$/g, "").split("/");
      if (parts.length < 2) {
        throw new Error(`KV path must include mount and name, got "${cliPath}".`);
      }
      const mount = encodeURIComponent(parts.shift());
      const name = parts.map(encodeURIComponent).join("/");
      return version === "2" ? `/v1/${mount}/data/${name}` : `/v1/${mount}/${name}`;
    }

    function shouldRetryAsKvV1(status, body) {
      return status === 404 && body.includes("/data/") && body.includes("route");
    }

    function secretDataFromPayload(payload, version) {
      return version === "2" ? payload?.data?.data : payload?.data;
    }

    const brokerResponse = await fetch(brokerUrl, {
      method: "POST",
      headers: {
        authorization: `Bearer ${runToken}`,
        "content-type": "application/json"
      },
      body: JSON.stringify({ secretPath })
    });
    if (!brokerResponse.ok) {
      throw new Error(`Broker token exchange failed: ${brokerResponse.status} ${await brokerResponse.text()}`);
    }
    const brokerPayload = await brokerResponse.json();
    if (!brokerPayload.token) {
      throw new Error("Broker response did not include a Vault token.");
    }
    if (!brokerPayload.vaultAddress) {
      throw new Error("Broker response did not include a Vault address.");
    }

    const headers = { "X-Vault-Token": brokerPayload.token };
    if (brokerPayload.vaultNamespace) {
      headers["X-Vault-Namespace"] = brokerPayload.vaultNamespace;
    }
    const versionsToTry = kvEngineVersion === "auto" ? ["2", "1"] : [kvEngineVersion];
    let vaultPayload;
    let successfulVersion;
    let lastError = "";
    for (const version of versionsToTry) {
      if (!["1", "2"].includes(version)) {
        throw new Error(`Unsupported kv-engine-version "${version}". Use auto, 1, or 2.`);
      }
      const vaultUrl = new URL(kvApiPath(secretPath, version), brokerPayload.vaultAddress);
      const vaultResponse = await fetch(vaultUrl, { headers });
      if (vaultResponse.ok) {
        vaultPayload = await vaultResponse.json();
        successfulVersion = version;
        break;
      }
      lastError = `${vaultResponse.status} ${await vaultResponse.text()}`;
      if (version !== "2" || !shouldRetryAsKvV1(vaultResponse.status, lastError)) {
        break;
      }
      console.log(`KV v2 route was not found for ${secretPath}; retrying as KV v1.`);
    }
    if (!vaultPayload) {
      throw new Error(`Vault secret read failed: ${lastError}`);
    }
    const secretData = secretDataFromPayload(vaultPayload, successfulVersion);
    if (!secretData || typeof secretData !== "object") {
      throw new Error(`Vault response for ${secretPath} did not include secret data.`);
    }
    if (!(secretKey in secretData)) {
      throw new Error(`Vault secret ${secretPath} does not include key "${secretKey}".`);
    }
    const secretValue = secretData[secretKey];
    writeFileSync(resultPath, "ok");
    console.log(`Vault secret read succeeded for path ${secretPath} using KV v${successfulVersion}`);
    if (revealSecretValue) {
      console.log(`Vault secret value ${secretPath}.${secretKey}=${String(secretValue)}`);
    } else {
      console.log(`Vault secret key ${secretPath}.${secretKey} is present; value hidden.`);
    }
