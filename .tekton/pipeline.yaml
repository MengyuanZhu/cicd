apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: hello-world
spec:
  params:
    - name: message
      type: string
      default: "hello from GitHub pipeline"
  tasks:
    - name: prepare-message
      taskSpec:
        params:
          - name: message
            type: string
        results:
          - name: formatted-message
            description: Message normalized for later tasks.
        steps:
          - name: format
            image: alpine:3.20
            script: |
              #!/bin/sh
              set -eu

              message="$(params.message)"
              printf "Prepared message: %s\n" "$message"
              printf "%s" "$message" > "$(results.formatted-message.path)"
      params:
        - name: message
          value: "$(params.message)"

    - name: say-hello
      runAfter:
        - prepare-message
      taskSpec:
        params:
          - name: message
            type: string
        steps:
          - name: echo
            image: alpine:3.20
            script: |
              #!/bin/sh
              set -eu

              echo "$(params.message)"
      params:
        - name: message
          value: "$(tasks.prepare-message.results.formatted-message)"

    - name: summarize
      runAfter:
        - say-hello
      taskSpec:
        params:
          - name: message
            type: string
        steps:
          - name: summary
            image: alpine:3.20
            script: |
              #!/bin/sh
              set -eu

              message="$(params.message)"
              echo "Pipeline completed successfully."
              echo "Final message: $message"
              echo "Message length: ${#message}"
      params:
        - name: message
          value: "$(tasks.prepare-message.results.formatted-message)"
