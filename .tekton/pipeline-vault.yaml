apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: vault-broker-demo
  labels:
    app.kubernetes.io/part-of: maestro-vault-demo
spec:
  params:
    - name: secret-path
      type: string
      default: kv/test
    - name: kv-engine-version
      type: string
      default: auto
    - name: secret-key
      type: string
      default: value
    - name: reveal-secret-value
      type: string
      default: "false"
  tasks:
    - name: read-vault-test-secret
      taskSpec:
        results:
          - name: vault-read-status
            description: "ok when broker token exchange and Vault secret read both succeed."
        steps:
          - name: read-test-secret
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/MengyuanZhu/cicd.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepAction/vault-broker-read-secret.yaml
            params:
              - name: secret-path
                value: "$(params.secret-path)"
              - name: kv-engine-version
                value: "$(params.kv-engine-version)"
              - name: secret-key
                value: "$(params.secret-key)"
              - name: reveal-secret-value
                value: "$(params.reveal-secret-value)"
              - name: result-path
                value: "$(results.vault-read-status.path)"
